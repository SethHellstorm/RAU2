<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TechStore</h1>

    <!-- Creacion de los botones -->
      <div class="filtros">
        <button onclick="filtrar('todos')" class="activo">Mostrar todos</button>
        <button onclick="filtrar('celular')">Celulares</button>
        <button onclick="filtrar('laptop')">Laptops</button>
        <button onclick="filtrar('accesorio')">Accesorios</button>
    </div>

    <!-- Creacion de los productos -->
     <div class="productos">
        <div class="producto celular">
            <h3>iPhone 13</h3>
            <p>Celular</p>
        </div>
        <div class="producto laptop">
            <h3>HP Pavilion</h3>
            <p>Laptop</p>
        </div>

        <div class="producto accesorio">
            <h3>Audífonos</h3>
            <p>Accesorio</p>
        </div>

        <div class="producto celular">
            <h3>Samsung Galaxy</h3>
            <p>Celular</p>
        </div>

        <div class="producto laptop">
            <h3>MacBook Air</h3>
            <p>Laptop</p>
        </div>
     </div>
</body>
</html>
